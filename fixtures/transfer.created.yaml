event: transfer.created
steps:
  - method: POST
    path: /accounts
    body:
      type: individual
      profile:
        individual:
          email: test@framepayments.dev
    capture: account_id
  - method: POST
    path: /transfers
    body:
      account_id: "{account_id}"
      amount: 1000
      currency: usd
    capture: transfer_id
