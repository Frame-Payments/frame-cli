event: invoice.paid
steps:
  - method: POST
    path: /accounts
    body:
      type: individual
      profile:
        individual:
          email: test@framepayments.dev
    capture: account_id
  - method: POST
    path: /invoices
    body:
      account_id: "{account_id}"
      amount: 2000
      currency: usd
    capture: invoice_id
  - method: force_transition
    resource_type: invoice
    resource_id: "{invoice_id}"
    target_state: paid
