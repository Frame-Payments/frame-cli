event: capability.approved
steps:
  - method: POST
    path: /accounts
    body:
      type: individual
      profile:
        individual:
          email: test@framepayments.dev
    capture: account_id
  - method: POST
    path: /capabilities
    body:
      account_id: "{account_id}"
      type: card_receive
    capture: capability_id
  - method: force_transition
    resource_type: capability
    resource_id: "{capability_id}"
    target_state: approved
