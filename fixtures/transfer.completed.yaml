event: transfer.completed
steps:
  - method: POST
    path: /accounts
    body:
      name: Test Account
    capture: account_id
  - method: POST
    path: /transfers
    body:
      account_id: "{account_id}"
      amount: 1000
      currency: usd
    capture: transfer_id
  - method: force_transition
    resource_type: transfer
    resource_id: "{transfer_id}"
    target_state: completed
