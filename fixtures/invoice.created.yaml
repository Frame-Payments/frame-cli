event: invoice.created
steps:
  - method: POST
    path: /accounts
    body:
      type: individual
      profile:
        individual:
          email: test@framepayments.dev
    capture: account_id
  - method: POST
    path: /invoices
    body:
      account_id: "{account_id}"
      amount: 2000
      currency: usd
    capture: invoice_id
